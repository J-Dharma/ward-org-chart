let allCollapsed=false;
function toggleAllBands(){
  allCollapsed=!allCollapsed;
  state.columns.forEach(c=>c.collapsed=allCollapsed);
  buildLayout(); scheduleSave();
}



// Returns true if the person can be placed in this org (gender check)
function genderAllowed(person, colId){
  const col=state.columns.find(c=>c.id===colId);
  const og=orgGender(col);
  if(!og) return true; // mixed org
  if(!person.gender) return true; // unknown gender, allow
  return person.gender===og;
}

function warnGenderMismatch(col){
  const og=orgGender(col);
  const label=og==='M'?'Brothers':'Sisters';
  alert(`${col?col.name:'This org'} is for ${label} only.`);
}
// Resume an existing history entry if the same calling+org is found,
// otherwise start a new one. Called whenever a person is placed into a calling.
function resumeOrStartCalling(p, role, colName){
  if(!role) return;
  if(!p.history) p.history=[];

  // Mark any existing "current" entry as ended
  p.history.forEach(h=>{ if(h.current){ h.current=false; if(!h.endDate) h.endDate=new Date().toISOString().slice(0,7); } });

  // Look for a matching past entry (same calling + org)
  const match=p.history.find(h=>
    !h.current &&
    h.calling===role &&
    (h.org||'')===(colName||'')
  );

  if(match){
    // Resume: restore startDate, clear endDate, mark current
    p.startDate=match.startDate||p.startDate||null;
    p.endDate=null;
    match.current=true;
    match.endDate=null;
  } else {
    // New calling: set startDate to today if not already set
    if(!p.startDate) p.startDate=new Date().toISOString().slice(0,7);
    p.endDate=null;
    p.history.unshift({
      calling:role,
      org:colName||'',
      years:'',
      startDate:p.startDate,
      endDate:null,
      current:true
    });
  }
}

function dropOntoOrg(colId, sgId, beforePid){
  if(!dragId) return;
  const p=state.people.find(x=>x.id===dragId);
  if(!p){ dragId=null; return; }
  if(!p.vacant && !genderAllowed(p, colId)){
    const col=state.columns.find(c=>c.id===colId);
    warnGenderMismatch(col); dragId=null; return;
  }
  snapshot();

  const movingBetweenCols=(p.colId!==colId && p.colId!==TRAY);
  if(movingBetweenCols && p.role && !p.vacant){
    // leave vacant at original position
    const peers=state.people.filter(x=>x.colId===p.colId);
    const srcPeer=peers[dragSrcIdx]||null;
    const ins=srcPeer?state.people.indexOf(srcPeer):state.people.length;
    state.people.splice(ins,0,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true});
  }
  p.colId=colId;
  p.subgroupId=sgId||null;
  const destCol=state.columns.find(c=>c.id===colId);
  // role stays as-is when moving between orgs; resume/start based on current role
  resumeOrStartCalling(p, p.role, destCol?destCol.name:'');
  dragId=null;
  rebuildAll();
}

function dropOntoVacant(vacant, colId){
  if(!dragId) return;
  const p=state.people.find(x=>x.id===dragId);
  if(!p){ dragId=null; return; }
  if(!genderAllowed(p, colId)){
    const col=state.columns.find(c=>c.id===colId);
    warnGenderMismatch(col); dragId=null; return;
  }
  snapshot();

  const movingBetweenCols=(p.colId!==colId && p.colId!==TRAY);
  if(movingBetweenCols && p.role && !p.vacant){
    const peers=state.people.filter(x=>x.colId===p.colId);
    const srcPeer=peers[dragSrcIdx]||null;
    const ins=srcPeer?state.people.indexOf(srcPeer):state.people.length;
    state.people.splice(ins,0,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true});
  }
  // Assign vacant's calling to person
  if(vacant.role) p.role=vacant.role;
  // Replace vacant in array with person
  const personIdx=state.people.findIndex(x=>x.id===dragId);
  state.people.splice(personIdx,1);
  const vacantIdx=state.people.findIndex(x=>x.id===vacant.id);
  state.people.splice(vacantIdx,1,p);
  p.colId=colId;
  p.subgroupId=vacant.subgroupId||null;
  const destColV=state.columns.find(c=>c.id===colId);
  if(p.role) resumeOrStartCalling(p, p.role, destColV?destColV.name:'');
  dragId=null;
  rebuildAll();
}

function dropReorder(colId, sgId, beforePid){
  if(!dragId) return;
  const p=state.people.find(x=>x.id===dragId);
  if(!p){ dragId=null; return; }
  if(!p.vacant && !genderAllowed(p, colId)){
    const col=state.columns.find(c=>c.id===colId);
    warnGenderMismatch(col); dragId=null; return;
  }
  snapshot();

  const sameCol=p.colId===colId;
  if(!sameCol && p.colId!==TRAY && p.role && !p.vacant){
    const peers=state.people.filter(x=>x.colId===p.colId);
    const srcPeer=peers[dragSrcIdx]||null;
    const ins=srcPeer?state.people.indexOf(srcPeer):state.people.length;
    state.people.splice(ins,0,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true});
  }

  const fromIdx=state.people.findIndex(x=>x.id===dragId);
  state.people.splice(fromIdx,1);
  const prevColId=p.colId;
  p.colId=colId; p.subgroupId=sgId!==undefined?sgId:null;
  // resume or start calling only when changing org
  if(prevColId!==colId){
    const destColR=state.columns.find(c=>c.id===colId);
    if(p.role) resumeOrStartCalling(p, p.role, destColR?destColR.name:'');
  }

  if(beforePid){
    const toIdx=state.people.findIndex(x=>x.id===beforePid);
    if(toIdx>=0){ state.people.splice(toIdx,0,p); }
    else { state.people.push(p); }
  } else {
    let lastIdx=-1;
    state.people.forEach((x,i)=>{ if(x.colId===colId&&x.subgroupId===sgId) lastIdx=i; });
    state.people.splice(lastIdx+1,0,p);
  }
  dragId=null;
  rebuildAll();
}

// Drop a person within the tray — reorder and/or assign to a group
function dropInTray(trayGroupId, beforePid){
  if(!dragId) return;
  const p=state.people.find(x=>x.id===dragId);
  if(!p){ dragId=null; return; }

  // If coming from an org, do the full dropToTray logic first
  if(p.colId!==TRAY){
    dropToTray(trayGroupId); return;
  }

  snapshot();
  // Reorder within tray
  const fromIdx=state.people.findIndex(x=>x.id===dragId);
  state.people.splice(fromIdx,1);
  p.trayGroupId=trayGroupId||null;

  if(beforePid){
    const toIdx=state.people.findIndex(x=>x.id===beforePid);
    if(toIdx>=0) state.people.splice(toIdx,0,p);
    else state.people.push(p);
  } else {
    // append at end of that group
    let lastIdx=-1;
    state.people.forEach((x,i)=>{ if(x.colId===TRAY&&x.trayGroupId===(trayGroupId||null)) lastIdx=i; });
    state.people.splice(lastIdx+1,0,p);
  }
  dragId=null;
  renderTray(); scheduleSave();
}

function dropToTray(trayGroupId){
  if(!dragId) return;
  snapshot();
  const p=state.people.find(x=>x.id===dragId);
  if(!p){ dragId=null; return; }

  if(p.colId!==TRAY && !p.vacant){
    const col=state.columns.find(c=>c.id===p.colId);
    const now=new Date().toISOString().slice(0,7);

    // Record history before removing from this calling
    if(p.role){
      if(!p.history) p.history=[];
      p.history.forEach(h=>{ if(h.current){ h.current=false; if(!h.endDate) h.endDate=now; h.years=calcTenure(p).toFixed(1); } });
      const alreadyRecorded=p.history.some(h=>h.calling===p.role&&(h.org||'')===(col?col.name:'')&&!h.current&&h.endDate===now);
      if(!alreadyRecorded){
        p.history.unshift({calling:p.role, org:col?col.name:'', years:calcTenure(p).toFixed(1), current:false, startDate:p.startDate||null, endDate:now});
      }

      // Check if this person has OTHER callings (multi-calling)
      const otherCallings=state.people.filter(x=>x.id!==p.id&&!x.vacant&&x.colId!==TRAY&&x.name===p.name);
      if(otherCallings.length>0){
        // They still have callings elsewhere — just leave a VACANT here, don't add to tray
        const peers=state.people.filter(x=>x.colId===p.colId);
        const srcPeer=peers[dragSrcIdx]||null;
        const ins=srcPeer?state.people.indexOf(srcPeer):state.people.length;
        state.people.splice(ins,0,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true});
        // Remove this calling instance entirely
        const idx=state.people.findIndex(x=>x.id===p.id);
        if(idx>=0) state.people.splice(idx,1);
        dragId=null;
        rebuildAll(); scheduleSave(); return;
      }

      // Single calling — leave VACANT, move person to tray
      const peers=state.people.filter(x=>x.colId===p.colId);
      const srcPeer=peers[dragSrcIdx]||null;
      const ins=srcPeer?state.people.indexOf(srcPeer):state.people.length;
      state.people.splice(ins,0,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true});
    }
  }

  p.colId=TRAY; p.role=''; p.subgroupId=null; p.time=0; p.startDate=null; p.endDate=null;

  // Youth auto-route to built-in Youth system group
  if(p.ageGroup==='Youth'){
    p.trayGroupId='__youth__';
  } else {
    p.trayGroupId=trayGroupId||null;
  }
  dragId=null;
  rebuildAll();
}

// ── TRAY ─────────────────────────────────────────────────────────────────────
let trayOpen=true;
let trayMode='flat';
let traySortBy='last'; // 'last'|'first' — sort by last or first name
let trayResizing=false, trayResizeStartX=0, trayResizeStartW=0;

// Wire tray resize handle after DOM ready
setTimeout(()=>{
  const handle=document.getElementById('tray-resize-handle');
  const pane=document.getElementById('tray-pane');
  if(!handle||!pane) return;
  handle.addEventListener('mousedown',e=>{
    trayResizing=true;
    trayResizeStartX=e.clientX;
    trayResizeStartW=pane.offsetWidth;
    pane.classList.add('resizing');
    e.preventDefault(); e.stopPropagation();
  });
},100);

window.addEventListener('mousemove',e=>{
  if(!trayResizing) return;
  const pane=document.getElementById('tray-pane');
  if(!pane) return;
  const delta=trayResizeStartX-e.clientX;
  const newW=Math.max(120,Math.min(600,trayResizeStartW+delta));
  pane.style.width=newW+'px';
  const fp=document.getElementById('filter-panel')||document.getElementById('filter-dropdown');
  if(fp) fp.style.right=(newW+8)+'px';
  updateTrayColumns();
});

window.addEventListener('mouseup',e=>{
  if(trayResizing){
    trayResizing=false;
    const pane=document.getElementById('tray-pane');
    if(pane) pane.classList.remove('resizing');
    updateTrayColumns();
  }
});

// ── TRAY FILTER ───────────────────────────────────────────────────────────────
let trayFilterOpen=false;
let trayGenderFilter='all'; // 'all'|'M'|'F'
let trayGroupFilter=new Set(); // empty = show all; entries = 'ungrouped' or group ids

function toggleTrayFilter(){
  trayFilterOpen=!trayFilterOpen;
  const dropdown=document.getElementById('tray-filter-dropdown');
  const btn=document.getElementById('tray-filter-btn');
  if(dropdown) dropdown.style.display=trayFilterOpen?'block':'none';
  if(btn) btn.classList.toggle('open', trayFilterOpen);
  if(trayFilterOpen) renderTrayFilterPanel();
}

// Close tray filter dropdown when clicking outside
document.addEventListener('click',e=>{
  if(!trayFilterOpen) return;
  const dropdown=document.getElementById('tray-filter-dropdown');
  const btn=document.getElementById('tray-filter-btn');
  if(dropdown&&!dropdown.contains(e.target)&&btn&&!btn.contains(e.target)){
    trayFilterOpen=false;
    dropdown.style.display='none';
    btn.classList.remove('open');
  }
});

function renderTrayFilterPanel(){
  // Sort options
  const sortDiv=document.getElementById('tray-filter-sort');
  if(sortDiv){
    sortDiv.innerHTML='';
    [{v:'last',l:'Last name'},{v:'first',l:'First name'}].forEach(({v,l})=>{
      const btn=document.createElement('button');
      btn.textContent=l;
      const isActive=traySortBy===v;
      btn.style.cssText=`font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid ${isActive?'var(--navy)':'var(--line-2)'};background:${isActive?'var(--navy)':'var(--surface-2)'};color:${isActive?'#fff':'var(--ink-2)'};cursor:pointer;font-family:inherit;font-weight:${isActive?'600':'400'};`;
      btn.onclick=()=>{ traySortBy=v; renderTray(); renderTrayFilterPanel(); };
      sortDiv.appendChild(btn);
    });
  }

  // Quick filters: All / Brothers / Sisters
  const quick=document.getElementById('tray-filter-quick');
  if(!quick) return;
  quick.innerHTML='';
  [{v:'all',l:'All'},{v:'M',l:'Brothers'},{v:'F',l:'Sisters'}].forEach(({v,l})=>{
    const btn=document.createElement('button');
    btn.textContent=l;
    const isActive=trayGenderFilter===v;
    btn.style.cssText=`font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid ${isActive?'var(--navy)':'var(--line-2)'};background:${isActive?'var(--navy)':'var(--surface-2)'};color:${isActive?'#fff':'var(--ink-2)'};cursor:pointer;font-family:inherit;font-weight:${isActive?'600':'400'};transition:all 0.1s;`;
    btn.onclick=()=>{ trayGenderFilter=v; renderTray(); renderTrayFilterPanel(); };
    quick.appendChild(btn);
  });

  // Group checkboxes — multi-select; empty Set = show all
  const groups=document.getElementById('tray-filter-groups');
  if(!groups) return;
  groups.innerHTML='';

  const showAll=trayGroupFilter.size===0;

  // "All groups" clear button
  const allRow=document.createElement('div');
  allRow.style.cssText='display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;';
  const allCb=document.createElement('input'); allCb.type='checkbox'; allCb.checked=showAll;
  allCb.style.accentColor='var(--navy)';
  allCb.onchange=()=>{ trayGroupFilter.clear(); renderTray(); renderTrayFilterPanel(); };
  const allLbl=document.createElement('span'); allLbl.style.cssText='font-size:11px;color:var(--ink);font-style:italic;'; allLbl.textContent='All groups';
  allRow.append(allCb,allLbl);
  groups.appendChild(allRow);

  // Separator
  const sep=document.createElement('div'); sep.style.cssText='height:1px;background:var(--line);margin:4px 0;'; groups.appendChild(sep);

  // Free Agents
  const ugRow=document.createElement('div');
  ugRow.style.cssText='display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;';
  const ugCb=document.createElement('input'); ugCb.type='checkbox'; ugCb.checked=trayGroupFilter.has('ungrouped');
  ugCb.style.accentColor='var(--navy)';
  ugCb.onchange=()=>{
    if(ugCb.checked) trayGroupFilter.add('ungrouped');
    else trayGroupFilter.delete('ungrouped');
    renderTray(); renderTrayFilterPanel();
  };
  const ugLbl=document.createElement('span'); ugLbl.style.cssText='font-size:11px;color:var(--ink-2);'; ugLbl.textContent='Free Agents';
  ugRow.append(ugCb,ugLbl);
  groups.appendChild(ugRow);

  (state.trayGroups||[]).forEach(tg=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=trayGroupFilter.has(tg.id);
    cb.style.accentColor='var(--navy)';
    cb.onchange=()=>{
      if(cb.checked) trayGroupFilter.add(tg.id);
      else trayGroupFilter.delete(tg.id);
      renderTray(); renderTrayFilterPanel();
    };
    const lbl=document.createElement('span'); lbl.style.cssText='font-size:11px;color:var(--ink-2);'; lbl.textContent=tg.name;
    row.append(cb,lbl);
    groups.appendChild(row);
  });

  // Update filter button active state
  const btn=document.getElementById('tray-filter-btn');
  if(btn) btn.style.background=trayGroupFilter.size>0||trayGenderFilter!=='all'?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.12)';
}

function addTrayGroup(){
  snapshot();
  if(!state.trayGroups) state.trayGroups=[];
  // Auto-name: "Group 1", "Group 2", etc. — user can rename inline
  let n=1;
  while(state.trayGroups.some(g=>g.name==='Group '+n)) n++;
  state.trayGroups.push({id:mkid(), name:'Group '+n});
  renderTray(); scheduleSave();
  // Focus the new group's name input after render so user can rename right away
  setTimeout(()=>{
    const heads=document.querySelectorAll('.tray-section-head input[type=text]');
    if(heads.length) heads[heads.length-1].select();
  }, 30);
}

function setTrayMode(m){ trayMode=m; renderTray(); updateTrayColumns(); }

function renderTray(){
  const scroll=document.getElementById('tray-scroll');
  if(!scroll) return;
  if(!state.trayGroups) state.trayGroups=[];

  const globalQ=(document.getElementById('tb-search')||{}).value||'';
  const q=globalQ.trim().toLowerCase();

  let allPeople=state.people.filter(p=>p.colId===TRAY);
  const gf=trayGenderFilter!=='all'?trayGenderFilter:(genderFilter!=='all'?genderFilter:'all');
  if(gf!=='all') allPeople=allPeople.filter(p=>{ const g=inferGender(p); return !g||g===gf; });
  if(q) allPeople=allPeople.filter(p=>p.name.toLowerCase().includes(q));

  document.getElementById('tray-cnt').textContent=`(${state.people.filter(p=>p.colId===TRAY).length})`;
  if(document.getElementById('tray-rail-cnt')) document.getElementById('tray-rail-cnt').textContent=state.people.filter(p=>p.colId===TRAY).length;
  scroll.innerHTML='';

  const showAll=trayGroupFilter.size===0;
  const showUngrouped=showAll||trayGroupFilter.has('ungrouped');

  function traySort(a,b){
    if(traySortBy==='first') return (a.name.split(' ')[0]||'').localeCompare(b.name.split(' ')[0]||'');
    return (a.name.split(' ').pop()||'').localeCompare(b.name.split(' ').pop()||'');
  }

  // Split each section's people into Brothers / Sisters sub-groups
  function genderSplit(people){
    return [
      {gender:'M', label:'Brothers', people: people.filter(p=>p.gender==='M').sort(traySort)},
      {gender:'F', label:'Sisters',  people: people.filter(p=>p.gender==='F').sort(traySort)},
      {gender:'',  label:'',         people: people.filter(p=>p.gender!=='M'&&p.gender!=='F').sort(traySort)},
    ].filter(g=>g.people.length>0);
  }

  const sections=[
    ...(showUngrouped?[{id:null, name:'', people:allPeople.filter(p=>!p.trayGroupId&&p.trayGroupId!=='__youth__'&&p.ageGroup!=='Youth'), isUngrouped:true}]:[]),
    ...(state.trayGroups||[])
      .filter(tg=>showAll||trayGroupFilter.has(tg.id))
      .map((tg)=>({id:tg.id, name:tg.name, tg, tgi:state.trayGroups.indexOf(tg),
        people:allPeople.filter(p=>p.trayGroupId===tg.id).sort(traySort),
        isUngrouped:false}))
  ];

  sections.forEach((sec, secIdx)=>{
    const section=document.createElement('div');
    section.className='tray-section'+(!sec.isUngrouped&&sec.tg&&sec.tg.collapsed?' collapsed':'');

    // Add drop zone before named groups; build section header for all sections
    if(!sec.isUngrouped){
      scroll.appendChild(makeTrayGroupDropZone(sec.tgi));

      const head=document.createElement('div');
      head.className='tray-section-head';
      head.draggable=true;

      const dragH=document.createElement('span');
      dragH.textContent='⠿';
      dragH.style.cssText='color:var(--ink-4);font-size:11px;cursor:grab;flex-shrink:0;';

      const chevron=document.createElement('span');
      chevron.className='tray-section-chevron';
      chevron.textContent='▾';

      const nameInp=document.createElement('input');
      nameInp.type='text'; nameInp.value=sec.tg.name;
      nameInp.style.cssText='font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:transparent;border:1px solid transparent;border-radius:3px;color:var(--navy);padding:1px 4px;outline:none;min-width:30px;max-width:140px;font-family:inherit;flex-shrink:0;';
      nameInp.addEventListener('focus',e=>{ e.stopPropagation(); nameInp.style.borderColor='var(--line-2)'; nameInp.style.background='var(--surface)'; });
      nameInp.addEventListener('blur',()=>{ nameInp.style.borderColor='transparent'; nameInp.style.background='transparent'; sec.tg.name=nameInp.value.trim()||sec.tg.name; nameInp.value=sec.tg.name; scheduleSave(); });
      nameInp.addEventListener('keydown',e=>{ if(e.key==='Enter') nameInp.blur(); e.stopPropagation(); });
      nameInp.addEventListener('click',e=>e.stopPropagation());

      const line=document.createElement('div');
      line.className='sg-head-line';

      const cnt=document.createElement('span');
      cnt.style.cssText='font-size:10px;color:var(--ink-3);flex-shrink:0;font-variant-numeric:tabular-nums;';
      cnt.textContent=sec.people.length;

      const del=document.createElement('span');
      del.textContent='×';
      del.style.cssText='color:var(--ink-4);cursor:pointer;font-size:13px;flex-shrink:0;padding:0 3px;line-height:1;border-radius:2px;';
      del.onclick=e=>{ e.stopPropagation(); snapshot(); state.people.forEach(p=>{ if(p.trayGroupId===sec.id) p.trayGroupId=null; }); state.trayGroups.splice(sec.tgi,1); renderTray(); scheduleSave(); };

      head.append(dragH, chevron, nameInp, line, cnt, del);
      head.addEventListener('click',e=>{ if(e.target===nameInp||e.target===del) return; sec.tg.collapsed=!sec.tg.collapsed; section.classList.toggle('collapsed',sec.tg.collapsed); scheduleSave(); });
      head.addEventListener('dragstart',e=>{ tgDragIdx=sec.tgi; setTimeout(()=>head.style.opacity='0.4',0); e.stopPropagation(); });
      head.addEventListener('dragend',()=>{ tgDragIdx=null; head.style.opacity=''; renderTray(); });

      section.appendChild(head);
    } else {
      // Free Agents (ungrouped) section: collapsible but no drag/rename
      const head=document.createElement('div');
      head.className='tray-section-head';

      const chevron=document.createElement('span');
      chevron.className='tray-section-chevron';
      chevron.textContent='▾';

      const label=document.createElement('span');
      label.className='sg-head-label';
      label.textContent='Free Agents';

      const line=document.createElement('div');
      line.className='sg-head-line';

      const cnt=document.createElement('span');
      cnt.style.cssText='font-size:10px;color:var(--ink-3);flex-shrink:0;font-variant-numeric:tabular-nums;';
      cnt.textContent=sec.people.length;

      head.append(chevron, label, line, cnt);
      head.addEventListener('click',()=>{ 
        section.classList.toggle('collapsed');
        scheduleSave(); 
      });

      section.appendChild(head);
    }

    const grid=document.createElement('div');
    grid.className='tray-chip-grid';
    grid.appendChild(makeTrayDropZone(sec.id, null));

    // Build chip grid with gender sub-grouping
    if(sec.isUngrouped){
      // Free Agents: also show Youth sub-section
      const youthPeople=allPeople.filter(p=>p.trayGroupId==='__youth__'||(!p.trayGroupId&&p.ageGroup==='Youth')).sort(traySort);
      const adultGroups=genderSplit(sec.people);

      adultGroups.forEach(g=>{
        if(g.label){
          const lbl=document.createElement('div'); lbl.className='tray-gender-divider'; lbl.textContent=g.label; grid.appendChild(lbl);
        }
        const inner=document.createElement('div'); inner.className='tray-chip-grid-inner'; inner.dataset.sgId=sec.id||'ungrouped';
        g.people.forEach(p=>inner.appendChild(makeTrayChip(p)));
        grid.appendChild(inner);
      });

      if(youthPeople.length){
        const yHead=document.createElement('div');
        yHead.className='tray-section-head';
        yHead.style.cssText='border-top:1px solid var(--line-2);';
        const yChev=document.createElement('span'); yChev.className='tray-section-chevron'; yChev.textContent='▾';
        const yLbl=document.createElement('span'); yLbl.className='sg-head-label'; yLbl.textContent='Youth';
        const yLine=document.createElement('div'); yLine.className='sg-head-line';
        const yCnt=document.createElement('span'); yCnt.style.cssText='font-size:10px;color:var(--ink-3);flex-shrink:0;'; yCnt.textContent=youthPeople.length;
        yHead.append(yChev,yLbl,yLine,yCnt);
        yHead.addEventListener('click',()=>{ yHead.nextElementSibling&&yHead.nextElementSibling.classList.toggle('collapsed'); });
        grid.appendChild(yHead);
        // Gender sub-grouping within Youth — same as free agents
        const youthGroups=genderSplit(youthPeople);
        youthGroups.forEach(g=>{
          if(g.label&&youthGroups.length>1){
            const lbl=document.createElement('div'); lbl.className='tray-gender-divider'; lbl.textContent=g.label; grid.appendChild(lbl);
          }
          const yInner=document.createElement('div'); yInner.className='tray-chip-grid-inner'; yInner.dataset.sgId='__youth__';
          g.people.forEach(p=>yInner.appendChild(makeTrayChip(p)));
          grid.appendChild(yInner);
        });
      }
    } else {
      // Named group: gender sub-grouping
      const groups=genderSplit(sec.people);
      groups.forEach(g=>{
        if(g.label&&groups.length>1){
          const lbl=document.createElement('div'); lbl.className='tray-gender-divider'; lbl.textContent=g.label; grid.appendChild(lbl);
        }
        const inner=document.createElement('div'); inner.className='tray-chip-grid-inner'; inner.dataset.sgId=sec.id||'ungrouped';
        g.people.forEach(p=>inner.appendChild(makeTrayChip(p)));
        grid.appendChild(inner);
      });
    }

    grid.appendChild(makeTrayDropZone(sec.id, null));
    section.appendChild(grid);
    scroll.appendChild(section);
  });

  scroll.appendChild(makeTrayGroupDropZone(state.trayGroups.length));

  const trayPane=document.getElementById('tray-pane');
  trayPane.ondragover=e=>{ if(dragId||potDragId){ e.preventDefault(); } };
  trayPane.ondragleave=e=>{ };
  trayPane.ondrop=e=>{ e.preventDefault(); if(dragId) dropToTray(null); };

  requestAnimationFrame(updateTrayColumns);
  requestAnimationFrame(renderPotentialCallings);
}

// ── POTENTIAL CALLINGS PANEL ─────────────────────────────────────────────────
function renderPotentialCallings(){
  const inner=document.getElementById('tray-inner'); if(!inner) return;
  const existing=document.getElementById('pot-panel'); if(existing) existing.remove();
  if(!state.potentialCallings) state.potentialCallings=[];
  if(!state._potHeight) state._potHeight=160;

  const panel=document.createElement('div');
  panel.id='pot-panel';
  panel.style.cssText='flex-shrink:0;display:flex;flex-direction:column;border-top:2px solid var(--line-2);background:var(--surface);';

  // ── Resize handle (drag up/down to size the body) ──
  const resizeH=document.createElement('div');
  resizeH.style.cssText='height:9px;cursor:ns-resize;background:var(--surface-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;';
  resizeH.innerHTML='<div style="width:34px;height:3px;border-radius:2px;background:var(--line-2);pointer-events:none;"></div>';
  if(state._potCollapsed) resizeH.style.display='none';

  // ── Header ──
  const head=document.createElement('div');
  head.className='tray-section-head';
  head.style.cssText='flex-shrink:0;border-top:none;cursor:pointer;';
  const chev=document.createElement('span'); chev.className='tray-section-chevron'; chev.textContent='\u25be';
  if(state._potCollapsed) chev.style.transform='rotate(-90deg)';
  const lbl=document.createElement('span'); lbl.className='sg-head-label'; lbl.textContent='Potential Callings';
  const line=document.createElement('div'); line.className='sg-head-line';
  const cnt=document.createElement('span');
  cnt.style.cssText='font-size:10px;color:var(--ink-3);flex-shrink:0;font-variant-numeric:tabular-nums;';
  cnt.textContent=state.potentialCallings.length;
  head.append(chev, lbl, line, cnt);

  // ── Body ──
  const body=document.createElement('div');
  body.style.cssText='overflow-y:auto;overflow-x:hidden;height:'+state._potHeight+'px;'+(state._potCollapsed?'display:none;':'');

  // Resize handle drag — adjusts body height
  resizeH.addEventListener('mousedown',e=>{
    e.preventDefault();
    const startY=e.clientY;
    const startH=state._potHeight;
    const onMove=ev=>{
      const newH=Math.max(60, Math.min(420, startH+(startY-ev.clientY)));
      state._potHeight=newH;
      body.style.height=newH+'px';
    };
    const onUp=()=>{
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      scheduleSave();
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });

  head.addEventListener('click',()=>{
    state._potCollapsed=!state._potCollapsed;
    if(state._potCollapsed){
      body.style.display='none';
      resizeH.style.display='none';
      chev.style.transform='rotate(-90deg)';
    } else {
      body.style.display='';
      body.style.height=state._potHeight+'px';
      resizeH.style.display='';
      chev.style.transform='';
    }
    scheduleSave();
  });

  // Drop vacant callings into the panel body
  body.addEventListener('dragover',e=>{
    if(!dragId) return;
    const dragging=state.people.find(x=>x.id===dragId);
    if(dragging&&dragging.vacant){ e.preventDefault(); e.stopPropagation(); body.style.background='var(--surface-2)'; }
  });
  body.addEventListener('dragleave',e=>{ if(!body.contains(e.relatedTarget)) body.style.background=''; });
  body.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation(); body.style.background='';
    if(!dragId) return;
    const dragging=state.people.find(x=>x.id===dragId);
    if(dragging&&dragging.vacant){
      snapshot();
      state.potentialCallings.push({id:mkid(), role:dragging.role, colId:dragging.colId, subgroupId:dragging.subgroupId});
      state.people=state.people.filter(x=>x.id!==dragging.id);
      renderPotentialCallings(); buildLayout(); updateTrayColumns(); scheduleSave();
    }
  });

  if(!state.potentialCallings.length){
    const hint=document.createElement('div');
    hint.style.cssText='font-size:11px;color:var(--ink-4);font-style:italic;padding:14px;text-align:center;';
    hint.textContent='Drag vacant callings here';
    body.appendChild(hint);
  } else {
    // Same grid structure as No Calling chips so they get identical column sizing
    const gridOuter=document.createElement('div'); gridOuter.className='tray-chip-grid';
    const gridInner=document.createElement('div'); gridInner.className='tray-chip-grid-inner pot-chip-grid';
    gridOuter.appendChild(gridInner);

    state.potentialCallings.forEach(pc=>{
      const chip=document.createElement('div');
      chip.className='tray-chip gender-M';
      chip.draggable=true;
      chip.addEventListener('dragstart',e=>{
        potDragId=pc.id;
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',pc.id);
        setTimeout(()=>chip.classList.add('dragging'),0);
      });
      chip.addEventListener('dragend',()=>{ potDragId=null; chip.classList.remove('dragging'); });
      const nameEl=document.createElement('div');
      nameEl.className='tray-chip-name';
      nameEl.textContent=pc.role||'Unnamed calling';
      nameEl.contentEditable='true';
      nameEl.style.outline='none';
      nameEl.addEventListener('click',e=>e.stopPropagation());
      nameEl.addEventListener('blur',()=>{
        const newRole=nameEl.textContent.trim();
        if(newRole&&newRole!==pc.role){ pc.role=newRole; scheduleSave(); }
        else nameEl.textContent=pc.role||'Unnamed calling';
      });
      nameEl.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); } e.stopPropagation(); });
      chip.appendChild(nameEl);
      const del=document.createElement('span');
      del.className='tray-chip-del';
      del.textContent='\u00d7';
      del.onclick=e=>{ e.stopPropagation(); snapshot(); state.potentialCallings=state.potentialCallings.filter(x=>x.id!==pc.id); renderPotentialCallings(); updateTrayColumns(); scheduleSave(); };
      chip.appendChild(del);
      gridInner.appendChild(chip);
    });
    body.appendChild(gridOuter);
  }

  panel.appendChild(resizeH);
  panel.appendChild(head);
  panel.appendChild(body);
  inner.appendChild(panel);
}


function makeTrayDropZone(trayGroupId, beforePid){
  const zone=document.createElement('div');
  zone.className='tray-section-drop';
  zone.style.width='100%';
  zone.addEventListener('dragover',e=>{
    if(dragId){ e.preventDefault(); e.stopPropagation(); zone.style.background='rgba(255,255,255,0.35)'; zone.style.height='18px'; }
  });
  zone.addEventListener('dragleave',()=>{ zone.style.background=''; zone.style.height='12px'; });
  zone.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation(); zone.style.background=''; zone.style.height='12px';
    if(dragId) dropInTray(trayGroupId, beforePid);
  });
  return zone;
}

function makeTrayGroupDropZone(insertBeforeIdx){
  const zone=document.createElement('div');
  zone.style.cssText='height:12px;width:100%;background:transparent;transition:background 0.1s,height 0.1s;border-radius:2px;';
  zone.addEventListener('dragover',e=>{
    if(tgDragIdx!==null){ e.preventDefault(); e.stopPropagation(); zone.style.background='rgba(255,255,255,0.35)'; zone.style.height='18px'; }
  });
  zone.addEventListener('dragleave',()=>{ zone.style.background=''; zone.style.height='12px'; });
  zone.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation(); zone.style.background=''; zone.style.height='12px';
    if(tgDragIdx!==null) dropReorderTrayGroup(insertBeforeIdx);
  });
  return zone;
}

function updateTrayColumns(){
  const pane=document.getElementById('tray-pane');
  if(!pane||!trayOpen) return;
  const w=pane.offsetWidth;
  const cols=w>=400?3:w>=220?2:1;
  document.querySelectorAll('.tray-chip-grid-inner').forEach(inner=>{
    const chips=inner.querySelectorAll('.tray-chip');
    if(!chips.length){ inner.style.height=''; return; }
    // Each chip is a fixed-width column cell; flow them top-to-bottom then wrap.
    chips.forEach(c=>{ c.style.width=(100/cols).toFixed(3)+'%'; c.style.boxSizing='border-box'; c.style.display='block'; });
    // Measure one chip's height, set container height so flex-wrap breaks into `cols` columns.
    const chipH=chips[0].offsetHeight||30;
    const perCol=Math.ceil(chips.length/cols);
    inner.style.height=(perCol*chipH)+'px';
  });
}


function makeTrayChip(p){
  const chip=document.createElement('div');
  const isYouth = p.ageGroup==='Youth';
  const genderCls = p.gender==='M' ? ' gender-M' : p.gender==='F' ? ' gender-F' : ' gender-U';
  const youthCls  = isYouth ? (p.gender==='F' ? ' youth-F' : ' youth-M') : '';
  chip.className='tray-chip'+genderCls+youthCls;
  chip.draggable=true;
  chip.dataset.pid=p.id;
  chip.addEventListener('dragstart',()=>onDragStart(p.id,chip));
  chip.addEventListener('dragend',()=>clearDrag(chip));
  chip.addEventListener('dblclick',e=>{ e.stopPropagation(); openPersonCard(p.id); });

  // Search highlight
  const q=((document.getElementById('tb-search')||{}).value||'').toLowerCase().trim();
  if(q){
    const match=(p.name||'').toLowerCase().includes(q)||(p.role||'').toLowerCase().includes(q);
    chip.classList.add(match?'search-match':'search-dim');
  }

  const name=document.createElement('div');
  name.className='tray-chip-name';
  name.textContent=p.name+(p.role?` · ${p.role}`:'');

function toggleTray(){
  trayOpen=!trayOpen;
  const pane=document.getElementById('tray-pane');
  pane.classList.toggle('collapsed',!trayOpen);
  if(!trayOpen){
    // Clear inline width so CSS collapsed class (44px) takes full effect
    pane.style.width='';
  }
  const btn=document.getElementById('tray-toggle-btn');
  if(btn) btn.textContent= trayOpen ? '←' : '→';
  const _fp=document.getElementById('filter-panel'); if(_fp) _fp.style.right=trayOpen?'295px':'48px';
  if(trayOpen){
    // Wait for the width transition to finish before measuring — otherwise
    // updateTrayColumns reads a mid-animation width and under-counts columns.
    const onEnd=e=>{ if(e.propertyName==='width') updateTrayColumns(); };
    pane.addEventListener('transitionend', onEnd, {once:true});
    setTimeout(()=>{ pane.removeEventListener('transitionend', onEnd); updateTrayColumns(); }, 200);
  }
}

function clearOrgToTray(colId, sgId){
  // Move all non-vacant people in the org (or subgroup if sgId given) to No Calling tray.
  // People with multiple callings (also serving elsewhere) are simply removed from
  // this calling — they don't appear in the tray since they still have a calling.
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  const label=sgId?(col.subgroups.find(s=>s.id===sgId)||{}).name||'subgroup':col.name;
  if(!confirm(`Move all filled callings in "${label}" to No Calling? Vacant slots stay. This cannot be undone easily.`)) return;
  snapshot();
  const now=new Date().toISOString().slice(0,7);
  // Count callings per person name across all orgs
  const callingCount={};
  state.people.forEach(p=>{ if(!p.vacant&&p.colId!==TRAY) callingCount[p.name]=(callingCount[p.name]||0)+1; });
  state.people.forEach(p=>{
    if(p.vacant) return;
    if(p.colId!==colId) return;
    if(sgId && p.subgroupId!==sgId) return;
    // Record history before moving
    if(p.role){
      if(!p.history) p.history=[];
      p.history.unshift({calling:p.role,org:col.name,years:calcTenure(p).toFixed(1),current:false,startDate:p.startDate||null,endDate:now});
    }
    // Check if person has other callings
    const otherCallings=callingCount[p.name]>1;
    if(otherCallings){
      // They still have other callings — just remove this one from the board
      // Mark as vacant so the slot stays, but remove person link
      p.vacant=true; p.name='VACANT';
    } else {
      // Move to tray
      p.colId=TRAY; p.role=''; p.subgroupId=null; p.time=0; p.startDate=null; p.endDate=null; p.trayGroupId=null;
    }
  });
  closeModal(); rebuildAll(); scheduleSave();
}

function deleteOrgFromSettings(colId){
  if(!confirm('Delete this org?\n\nFilled callings move to No Calling. Vacant slots are removed. This cannot be undone.')) return;
  snapshot();
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  const orgName=col.name;
  const now=new Date().toISOString().slice(0,7);
  // Separate vacants (delete them) from filled (move to tray)
  const toDelete=new Set(state.people.filter(p=>p.colId===colId&&p.vacant).map(p=>p.id));
  state.people.forEach(p=>{
    if(p.colId!==colId||p.vacant) return;
    if(p.role){
      if(!p.history) p.history=[];
      p.history.forEach(h=>{ if(h.current){ h.current=false; if(!h.endDate) h.endDate=now; } });
      p.history.unshift({calling:p.role,org:orgName,startDate:p.startDate||null,endDate:now,current:false,years:calcTenure(p).toFixed(1)});
    }
    p.colId=TRAY; p.subgroupId=null; p.role=''; p.startDate=null; p.endDate=null; p.trayGroupId=null;
  });
  state.people=state.people.filter(p=>!toDelete.has(p.id));
  state.columns=state.columns.filter(c=>c.id!==colId);
  closeModal(); buildLayout(); renderJumpNav(); renderTray(); renderFdOrgList(); scheduleSave();
}

        <label>Organization</label>
        <select id="add-calling-org">
          <option value="">— Select an org —</option>
          ${orgOptions()}
        </select>
        <label style="margin-top:14px;display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="add-calling-vacant" checked style="accent-color:var(--accent);width:14px;height:14px;">
          <span>Create as Vacant (unfilled)</span>
        </label>
        <label>Assigned to (if filled)</label>
        <input id="add-calling-person" type="text" placeholder="Name if already assigned…" />`;
      setTimeout(()=>{
        const ni=document.getElementById('add-calling-name'); if(ni){ ni.focus(); ni.addEventListener('keydown',e=>{ if(e.key==='Enter') doAddCalling(overlay); }); }
        // Wire checkbox to show/hide person input
        const cb=document.getElementById('add-calling-vacant');
        const personRow=document.getElementById('add-calling-person');
        if(cb&&personRow){
          personRow.closest('label').style.opacity = cb.checked ? '0.35' : '1';
          cb.addEventListener('change',()=>{ personRow.closest('label').style.opacity = cb.checked?'0.35':'1'; if(!cb.checked) personRow.focus(); });
        }
      },0);
    } else {
      body.innerHTML=`
        <label>Org Name</label>
        <input id="add-org-name" type="text" placeholder="e.g. Activities Committee" />
        <label>Gender</label>
        <div style="display:flex;gap:6px;margin-bottom:4px;">
          <button type="button" class="add-toggle" data-val="" id="add-og-any"  style="flex:1;padding:5px;border:1px solid var(--line-2);border-radius:5px;cursor:pointer;font-size:11px;background:var(--navy);color:#fff;font-family:inherit;">All</button>
          <button type="button" class="add-toggle" data-val="M" id="add-og-m"   style="flex:1;padding:5px;border:1px solid var(--line-2);border-radius:5px;cursor:pointer;font-size:11px;background:var(--surface-2);color:var(--ink-2);font-family:inherit;">Brothers</button>
          <button type="button" class="add-toggle" data-val="F" id="add-og-f"   style="flex:1;padding:5px;border:1px solid var(--line-2);border-radius:5px;cursor:pointer;font-size:11px;background:var(--surface-2);color:var(--ink-2);font-family:inherit;">Sisters</button>
        </div>`;
      setTimeout(()=>{
        const ni=document.getElementById('add-org-name'); if(ni){ ni.focus(); ni.addEventListener('keydown',e=>{ if(e.key==='Enter') doAddOrg(overlay); }); }
        // Wire gender toggle
        ['add-og-any','add-og-m','add-og-f'].forEach(id=>{
          const btn=document.getElementById(id); if(!btn) return;
          btn.addEventListener('click',()=>{
            ['add-og-any','add-og-m','add-og-f'].forEach(b=>{ const el=document.getElementById(b); if(el){el.style.background='var(--surface-2)';el.style.color='var(--ink-2)';} });
            btn.style.background='var(--navy)'; btn.style.color='#fff';
          });
        });
      },0);
    }
  }
  renderAddBody();
}

function doAddMember(overlay){
  const name=(document.getElementById('add-name')||{}).value.trim(); if(!name) return;
  const genderBtn=document.querySelector('#add-gender-toggle .add-toggle.active');
  const gender=genderBtn?genderBtn.dataset.val||'':'';
  const isYouthCb=document.getElementById('add-youth-cb');
  const ageGroup=isYouthCb&&isYouthCb.checked?'Youth':'';
  const role=(document.getElementById('add-role')||{}).value.trim()||'';
  const orgId=(document.getElementById('add-org')||{}).value||'';
  snapshot();
  const colId=orgId||TRAY;

  // Duplicate name warning
  const dup=state.people.find(x=>x.name.toLowerCase()===name.toLowerCase()&&!x.vacant);
  if(dup){
    const dupCol=state.columns.find(c=>c.id===dup.colId);
    const loc=dupCol?dupCol.name:(dup.colId===TRAY?'No Calling':'');
    if(!confirm(`"${name}" already exists${loc?' in '+loc:''}${dup.role?' as '+dup.role:''}.\n\nAdd anyway?`)) return;
  }

  const p={id:mkid(),name,role,colId,subgroupId:null,time:0,vacant:false,gender,startDate:role&&orgId?new Date().toISOString().slice(0,7):null};
  if(ageGroup==='Youth'){ p.ageGroup='Youth'; p.age=15; }
  state.people.push(p);
  overlay.remove();
  rebuildAll();
}

function doAddCalling(overlay){
  const roleName=(document.getElementById('add-calling-name')||{}).value.trim(); if(!roleName) return;
  const orgId=(document.getElementById('add-calling-org')||{}).value||''; if(!orgId) { alert('Please select an organization.'); return; }
  const isVacant=(document.getElementById('add-calling-vacant')||{}).checked!==false;
  const personName=(document.getElementById('add-calling-person')||{}).value.trim();
  snapshot();
  if(isVacant || !personName){
    // Add a vacant row
    state.people.push({id:mkid(),name:'VACANT',role:roleName,colId:orgId,subgroupId:null,time:0,vacant:true});
  } else {
    // Assign directly to named person (create or find in tray)
    let person = state.people.find(p=>p.name.toLowerCase()===personName.toLowerCase()&&p.colId===TRAY);
    if(person){
      // Move from tray into org
      person.colId=orgId; person.role=roleName; person.startDate=new Date().toISOString().slice(0,7);
    } else {
      // Create new person with this calling
      state.people.push({id:mkid(),name:personName,role:roleName,colId:orgId,subgroupId:null,time:0,vacant:false,startDate:new Date().toISOString().slice(0,7)});
    }
  }
  overlay.remove();
  rebuildAll();
}

function doAddOrg(overlay){
  const name=(document.getElementById('add-org-name')||{}).value.trim(); if(!name) return;
  const cat='';
  const ogBtn=['add-og-m','add-og-f'].find(id=>{ const el=document.getElementById(id); return el&&el.style.background.includes('navy'); });
  const orgGenderVal=ogBtn?document.getElementById(ogBtn).dataset.val:'';
  snapshot();
  const maxOrder=state.columns.length?Math.max(...state.columns.map(c=>c.order||0)):-1;
  state.columns.push({id:mkid(),name,color:COLORS[state.columns.length%COLORS.length],order:maxOrder+2,
    subgroups:[{id:mkid(),name:'General',slot:0,span:1,order:0,isGeneral:true}],
    hidden:false,category:cat,orgGender:orgGenderVal});
  overlay.remove();
  buildLayout(); renderJumpNav(); scheduleSave();
}

// Shims
function addOrg(){ openAddDialog('org'); }
function addToTray(){
  const inp=document.getElementById('new-member');
  if(inp){ const name=inp.value.trim(); if(!name) return; snapshot(); state.people.push({id:mkid(),name,role:'',colId:TRAY,subgroupId:null,time:0,vacant:false}); inp.value=''; renderTray(); scheduleSave(); return; }
  openAddDialog('member');
}

// ── REMOVE ────────────────────────────────────────────────────────────────────
function removePerson(id){
  snapshot();
  const p=state.people.find(x=>x.id===id); if(!p) return;
  if(p.colId===TRAY){ state.people=state.people.filter(x=>x.id!==id); }
  else {
    const idx=state.people.findIndex(x=>x.id===id);
    if(p.role){ state.people.splice(idx,1,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true}); }
    else { state.people.splice(idx,1); }
    p.colId=TRAY; p.role=''; p.subgroupId=null; state.people.push(p);
  }
  rebuildAll();
}

function removeOrg(colId){
  snapshot();
  state.people.forEach(p=>{ if(p.colId===colId) p.colId=TRAY; });
  state.columns=state.columns.filter(c=>c.id!==colId);
  buildLayout(); renderTray(); scheduleSave();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
// ── PERSON INFO CARD ──────────────────────────────────────────────────────────
function openPersonCard(pid, showLinked){
  const p=state.people.find(x=>x.id===pid);
  if(!p||p.vacant) return;
  const col=state.columns.find(c=>c.id===p.colId);

  // Close any existing
  const existing=document.getElementById('person-card-overlay');
  if(existing) existing.remove();

  const overlay=document.createElement('div');
  overlay.id='person-card-overlay';
  overlay.onclick=e=>{ if(e.target===overlay) saveAndCloseCard(pid); };

  const card=document.createElement('div');
  card.id='person-card';

  // ── Header ──
  const header=document.createElement('div');
  header.id='person-card-header';
  header.innerHTML=`<div id="person-card-close" onclick="saveAndCloseCard('${pid}')">×</div>`;

  // Editable name
  const nameInp=document.createElement('input');
  nameInp.id='pc-name';
  nameInp.type='text';
  nameInp.value=p.name;
  nameInp.style.cssText='width:100%;font-size:16px;font-weight:600;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 7px;color:#fff;outline:none;margin-bottom:6px;';
  nameInp.addEventListener('focus',()=>nameInp.style.background='rgba(255,255,255,0.2)');
  nameInp.addEventListener('blur',()=>nameInp.style.background='rgba(255,255,255,0.12)');
  header.appendChild(nameInp);

  // Editable role + org on one line
  const metaRow=document.createElement('div');
  metaRow.style.cssText='display:flex;gap:6px;align-items:center;';
  const roleInp=document.createElement('input');
  roleInp.id='pc-role';
  roleInp.type='text';
  roleInp.value=p.role||'';
  roleInp.placeholder='Calling / role…';
  roleInp.style.cssText='flex:1;font-size:12px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:4px;padding:3px 7px;color:var(--ink);outline:none;';
  const orgSelect=document.createElement('select');
  orgSelect.id='pc-org';
  orgSelect.style.cssText='font-size:11px;padding:3px 6px;background:var(--surface);border:1px solid var(--line-2);border-radius:4px;color:var(--ink);outline:none;max-width:140px;flex-shrink:0;';
  const noOrgOpt=document.createElement('option');
  noOrgOpt.value=''; noOrgOpt.textContent='— No Calling —';
  orgSelect.appendChild(noOrgOpt);
  state.columns.filter(c=>!c.hidden).sort((a,b)=>(a.order||0)-(b.order||0)).forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c.id; opt.textContent=c.name;
    if(c.id===p.colId) opt.selected=true;
    orgSelect.appendChild(opt);
  });
  metaRow.append(roleInp, orgSelect);
  header.appendChild(metaRow);
  card.appendChild(header);

  // ── Body ──
  const body=document.createElement('div');
  body.id='person-card-body';

  // Details section
  const detSec=document.createElement('div');
  detSec.className='pc-section';
  detSec.innerHTML='<div class="pc-section-title">Details</div>';

  // Gender
  const gRow=document.createElement('div'); gRow.className='pc-row';
  gRow.innerHTML=`<div class="pc-label">Gender</div>`;
  const gBtns=document.createElement('div'); gBtns.className='pc-gender-btns';
  ['M','F'].forEach(g=>{
    const btn=document.createElement('button');
    btn.className='pc-gender-btn'+(p.gender===g?' active':'');
    btn.textContent=g==='M'?'Brother':'Sister';
    btn.onclick=()=>{
      p.gender=g;
      gBtns.querySelectorAll('.pc-gender-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    gBtns.appendChild(btn);
  });
  gRow.appendChild(gBtns);
  detSec.appendChild(gRow);

  // Youth flag — checkbox, unchecked by default
  const ageRow=document.createElement('div'); ageRow.className='pc-row';
  const youthLabel=document.createElement('label');
  youthLabel.style.cssText='display:flex;align-items:center;gap:6px;cursor:pointer;';
  const youthCb=document.createElement('input');
  youthCb.type='checkbox';
  youthCb.checked=p.ageGroup==='Youth';
  youthCb.style.accentColor='var(--navy)';
  youthCb.style.width='14px'; youthCb.style.height='14px';
  youthCb.onchange=()=>{ p.ageGroup=youthCb.checked?'Youth':''; p.age=youthCb.checked?17:undefined; };
  const youthLblText=document.createElement('span');
  youthLblText.style.cssText='font-size:12px;color:var(--ink);';
  youthLblText.textContent='Youth';
  youthLabel.append(youthCb, youthLblText);
  ageRow.innerHTML=`<div class="pc-label">Age Group</div>`;
  ageRow.appendChild(youthLabel);
  detSec.appendChild(ageRow);

  // Calling dates
  const datesRow=document.createElement('div'); datesRow.className='pc-row'; datesRow.style.alignItems='flex-start'; datesRow.style.flexDirection='column'; datesRow.style.gap='4px';
  datesRow.innerHTML=`<div class="pc-label" style="width:auto">Dates in calling</div>
    <div style="display:flex;align-items:center;gap:6px;width:100%">
      <input class="pc-input" id="pc-start-date" type="month" value="${p.startDate||''}" style="flex:1;min-width:0" title="Start date"/>
      <span style="color:var(--text-tertiary);flex-shrink:0;font-size:12px">→</span>
      <input class="pc-input" id="pc-end-date" type="month" value="${p.endDate||''}" style="flex:1;min-width:0" placeholder="present" title="End date"/>
    </div>`;
  detSec.appendChild(datesRow);

  // Dynamic tenure display
  const tenureRow=document.createElement('div'); tenureRow.className='pc-row';
  tenureRow.innerHTML=`<div class="pc-label">Tenure</div><div id="pc-tenure-display" class="pc-value" style="font-variant-numeric:tabular-nums"></div>`;
  detSec.appendChild(tenureRow);

  function updateTenureDisplay(){
    const startEl=document.getElementById('pc-start-date');
    const endEl=document.getElementById('pc-end-date');
    const disp=document.getElementById('pc-tenure-display');
    if(!disp) return;
    const startVal=startEl?startEl.value:p.startDate;
    const endVal=endEl?endEl.value:p.endDate;
    const start=startVal?new Date(startVal+'-01'):null;
    const end=endVal?new Date(endVal+'-01'):new Date();
    if(start && !isNaN(start)){
      const y=Math.max(0,(end-start)/(1000*60*60*24*365.25));
      const color=y>=5?'#b02010':y>=3?'#8a6800':'#1a6b30';
      disp.innerHTML=`<span style="color:${color};font-weight:600">${y.toFixed(1)} years</span>`;
    } else {
      disp.textContent='Set a start date to calculate';
      disp.style.color='var(--text-tertiary)';
      disp.style.fontStyle='italic';
    }
  }
  detSec.appendChild(tenureRow);
  detSec.appendChild(datesRow);
  // Call after elements exist in DOM
  setTimeout(updateTenureDisplay, 0);
  // Wire change listeners
  datesRow.querySelector('#pc-start-date').addEventListener('input',updateTenureDisplay);
  datesRow.querySelector('#pc-end-date').addEventListener('input',updateTenureDisplay);

  // Notes
  const notesRow=document.createElement('div'); notesRow.className='pc-row'; notesRow.style.alignItems='flex-start';
  notesRow.innerHTML=`<div class="pc-label" style="padding-top:4px">Notes</div><textarea class="pc-input" id="pc-notes" rows="2" placeholder="Any notes…" style="resize:vertical">${p.notes||''}</textarea>`;
  detSec.appendChild(notesRow);
  body.appendChild(detSec);
  // Ensure current calling history entry exists for this card's calling
  if(p.role && p.colId!==TRAY){
    const colName=col?col.name:'';
    if(!p.history) p.history=[];
    const hasCurrent=p.history.some(h=>h.calling===p.role&&h.org===colName&&h.current);
    if(!hasCurrent){
      const past=p.history.find(h=>!h.current&&h.calling===p.role&&(h.org||'')===(colName||''));
      if(past){
        past.current=true; past.endDate=null;
        if(past.startDate) p.startDate=past.startDate;
      } else {
        p.history=p.history.filter(h=>!h.current);
        p.history.unshift({calling:p.role, org:colName, years:calcTenure(p).toFixed(1), current:true, startDate:p.startDate||null});
      }
    }
  }

  // Also ensure linked callings (same person, other orgs) have their current entry recorded
  const linkedPeople=state.people.filter(x=>x.name===p.name&&x.id!==pid&&!x.vacant&&x.colId!==TRAY);
  linkedPeople.forEach(lp=>{
    const lCol=state.columns.find(c=>c.id===lp.colId);
    const lColName=lCol?lCol.name:'';
    if(!lp.history) lp.history=[];
    const hasCurrent=lp.history.some(h=>h.calling===lp.role&&h.org===lColName&&h.current);
    if(!hasCurrent){
      const past=lp.history.find(h=>!h.current&&h.calling===lp.role&&(h.org||'')===(lColName||''));
      if(past){ past.current=true; past.endDate=null; }
      else { lp.history.unshift({calling:lp.role, org:lColName, years:calcTenure(lp).toFixed(1), current:true, startDate:lp.startDate||null}); }
    }
  });

  // Calling history section — show history from ALL callings this person holds
  const histSec=document.createElement('div');
  histSec.className='pc-section';
  histSec.innerHTML='<div class="pc-section-title">Calling History</div>';

  const histList=document.createElement('div');
  histList.id='pc-hist-list';

  // Combine history from this calling and all linked callings
  function getCombinedHistory(){
    const all=[...(p.history||[])];
    linkedPeople.forEach(lp=>{ (lp.history||[]).forEach(h=>{ if(!all.some(x=>x.calling===h.calling&&x.org===h.org&&x.startDate===h.startDate)) all.push(h); }); });
    // Sort: current first, then by startDate descending
    return all.sort((a,b)=>{ if(a.current&&!b.current) return -1; if(!a.current&&b.current) return 1; return (b.startDate||'').localeCompare(a.startDate||''); });
  }

  function renderHistory(){
    histList.innerHTML='';
    const history=getCombinedHistory();
    if(!history.length){
      histList.innerHTML='<div style="font-size:11px;color:var(--text-tertiary);padding:4px 0">No history recorded</div>';
    } else {
      history.forEach((h,i)=>{
        const item=document.createElement('div');
        item.className='pc-history-item';
        item.style.flexDirection='column';

        // View row
        const viewRow=document.createElement('div');
        viewRow.style.cssText='display:flex;align-items:center;gap:4px;font-size:11px;width:100%;';
        const currentBadge=h.current?'<span style="font-size:9px;background:rgba(0,51,102,0.1);color:var(--accent-navy);padding:1px 5px;border-radius:3px;flex-shrink:0">current</span>':'';
        const startFmt=h.startDate?formatDate(h.startDate):'';
        const endFmt=h.endDate?formatDate(h.endDate):(h.current?'present':'');
        const dateStr=startFmt?(startFmt+(endFmt?' → '+endFmt:'')):'';
        viewRow.innerHTML=`
          <span class="pc-history-calling" style="flex-shrink:0;font-weight:500">${h.calling||'—'}</span>
          ${h.org?`<span style="color:var(--text-tertiary)">·</span><span class="pc-history-org" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.org}</span>`:'<span style="flex:1"></span>'}
          ${dateStr?`<span style="color:var(--text-tertiary);font-size:10px;flex-shrink:0">${dateStr}</span>`:''}
          ${currentBadge}
          <span class="pc-history-edit-btn" data-idx="${i}" title="Edit" style="cursor:pointer;color:var(--text-tertiary);padding:0 3px;flex-shrink:0;font-size:11px">✎</span>
          ${h.current?'':'<div class="pc-history-del" onclick="removeHistoryFromAny(\''+pid+'\',\''+( h.calling||'').replace(/'/g,"\\'")+'\',' +'\''+( h.org||'').replace(/'/g,"\\'")+'\',' +'\''+( h.startDate||'').replace(/'/g,"\\'")+'\''+')" title="Delete this history entry" style="flex-shrink:0">×</div>'}`;
        item.appendChild(viewRow);

        // Edit row (hidden by default)
        const editRow=document.createElement('div');
        editRow.style.cssText='display:none;flex-direction:column;gap:4px;padding:4px 0 4px 4px;border-left:2px solid var(--border-mid);margin-left:2px;margin-top:4px;';

        const r1=document.createElement('div'); r1.style.cssText='display:flex;gap:4px;';
        const callingInp=document.createElement('input'); callingInp.type='text'; callingInp.value=h.calling||''; callingInp.placeholder='Calling…';
        callingInp.style.cssText='flex:1;font-size:11px;padding:2px 6px;border:1px solid var(--border-mid);border-radius:3px;background:#fafafa;color:var(--text-primary);outline:none;';
        callingInp.addEventListener('change',()=>h.calling=callingInp.value.trim());
        const orgSel=document.createElement('select');
        orgSel.style.cssText='font-size:10px;padding:2px 4px;border:1px solid var(--border-mid);border-radius:3px;background:#fafafa;color:var(--text-secondary);max-width:120px;outline:none;';
        const blankOpt=document.createElement('option'); blankOpt.value=''; blankOpt.textContent='— Org —'; orgSel.appendChild(blankOpt);
        state.columns.sort((a,b)=>(a.order||0)-(b.order||0)).forEach(c=>{
          const opt=document.createElement('option'); opt.value=c.name; opt.textContent=c.name;
          if(c.name===(h.org||'')) opt.selected=true; orgSel.appendChild(opt);
        });
        orgSel.addEventListener('change',()=>h.org=orgSel.value);
        r1.append(callingInp, orgSel);

        const r2=document.createElement('div'); r2.style.cssText='display:flex;align-items:center;gap:4px;';
        const sInp=document.createElement('input'); sInp.type='month'; sInp.value=h.startDate||'';
        sInp.style.cssText='font-size:10px;padding:2px 4px;border:1px solid var(--border-mid);border-radius:3px;background:#fafafa;color:var(--text-secondary);flex:1;outline:none;';
        sInp.addEventListener('change',()=>{ h.startDate=sInp.value||null; if(h.current&&p.startDate!==undefined) p.startDate=h.startDate; });
        const arr=document.createElement('span'); arr.textContent='→'; arr.style.cssText='font-size:10px;color:var(--text-tertiary);flex-shrink:0;';
        const eInp=document.createElement('input'); eInp.type='month'; eInp.value=h.endDate||''; eInp.placeholder='present';
        eInp.style.cssText='font-size:10px;padding:2px 4px;border:1px solid var(--border-mid);border-radius:3px;background:#fafafa;color:var(--text-secondary);flex:1;outline:none;';
        eInp.addEventListener('change',()=>h.endDate=eInp.value||null);
        r2.append(sInp,arr,eInp);

        editRow.append(r1,r2);
        item.appendChild(editRow);

        // Pencil toggle
        viewRow.querySelector('.pc-history-edit-btn').addEventListener('click',e=>{
          e.stopPropagation();
          const open=editRow.style.display!=='none';
          editRow.style.display=open?'none':'flex';
          e.target.style.color=open?'var(--text-tertiary)':'var(--accent-navy)';
        });

        histList.appendChild(item);
      });
    }
  }
  renderHistory();
  histSec.appendChild(histList);

  // Build org options from current columns
  const orgOptions=state.columns
    .filter(c=>!c.hidden)
    .sort((a,b)=>(a.order||0)-(b.order||0))
    .map(c=>`<option value="${c.name}">${c.name}</option>`)
    .join('');

  // Add history row — free text calling + org select
  const addHist=document.createElement('div');
  addHist.className='pc-add-history';
  addHist.innerHTML=`
    <input id="pc-hist-calling" type="text" placeholder="Previous calling…"/>

function addHistory(pid){
  const p=state.people.find(x=>x.id===pid); if(!p) return;
  const calling=document.getElementById('pc-hist-calling').value.trim();
  if(!calling) return;
  const orgEl=document.getElementById('pc-hist-org');
  const org=orgEl?orgEl.value:'';
  if(!p.history) p.history=[];
  p.history.splice(1,0,{calling, org, years:'', current:false});
  document.getElementById('pc-hist-calling').value='';
  if(orgEl) orgEl.value='';
  if(window._renderHistory) window._renderHistory();
}

function removeHistory(pid, idx){
  const p=state.people.find(x=>x.id===pid); if(!p||!p.history) return;
  p.history.splice(idx,1);
  if(window._renderHistory) window._renderHistory();
}

function removeHistoryFromAny(pid, calling, org, startDate){
  // Remove matching history entry from the main person and any linked people
  const main=state.people.find(x=>x.id===pid);
  const linked=main?state.people.filter(x=>x.name===main.name&&!x.vacant&&x.colId!==TRAY):[];
  const all=[main,...linked].filter(Boolean);
  snapshot();
  all.forEach(p=>{
    if(!p.history) return;
    p.history=p.history.filter(h=>!(h.calling===calling&&(h.org||'')===(org||'')&&(h.startDate||'')===(startDate||'')));
  });
  if(window._renderHistory) window._renderHistory();
  scheduleSave();
}

function saveAndCloseCard(pid, save=false){
  const p=state.people.find(x=>x.id===pid);
  if(p && save){
    snapshot();

    // Name
    const nameEl=document.getElementById('pc-name');
    if(nameEl && nameEl.value.trim()) p.name=nameEl.value.trim();

    // Role
    const roleEl=document.getElementById('pc-role');
    if(roleEl) p.role=roleEl.value.trim();

    // Org (may change which column they're in)
    const orgEl=document.getElementById('pc-org');
    if(orgEl && orgEl.value && orgEl.value!==p.colId){
      const newCol=state.columns.find(c=>c.id===orgEl.value);
      if(newCol && genderAllowed(p, newCol.id)){
        // leave vacant in old col if they had a role
        if(p.role && p.colId!==TRAY){
          const oldPeerIdx=state.people.findIndex(x=>x.id===p.id);
          state.people.splice(oldPeerIdx,0,{id:mkid(),name:'VACANT',role:p.role,colId:p.colId,subgroupId:p.subgroupId,time:0,vacant:true});
        }
        p.colId=newCol.id; p.subgroupId=null;
        resumeOrStartCalling(p, p.role, newCol.name);
      }
    }

    // Dates
    const startEl=document.getElementById('pc-start-date');
    const endEl=document.getElementById('pc-end-date');
    if(startEl) p.startDate=startEl.value||null;
    if(endEl) p.endDate=endEl.value||null;
    p.time=calcTenure(p);

    // Notes
    const notesEl=document.getElementById('pc-notes');
    if(notesEl) p.notes=notesEl.value.trim();

    // Sync current history entry's startDate with the card's startDate
    if(p.history){
      const cur=p.history.find(h=>h.current);
      if(cur && p.startDate) cur.startDate=p.startDate;
    }

    scheduleSave();
    buildLayout(); renderTray();
  }
  const overlay=document.getElementById('person-card-overlay');
  if(overlay) overlay.remove();
  window._pcPid=null; window._renderHistory=null;
}

const undoStack=[]; const MAX_UNDO=40;
function snapshot(){
  undoStack.push(JSON.stringify({columns:state.columns,people:state.people,categories:state.categories,trayGroups:state.trayGroups||[]}));
  if(undoStack.length>MAX_UNDO) undoStack.shift();
}
function undo(){
  if(!undoStack.length) return;
  const prev=JSON.parse(undoStack.pop());
  state.columns=prev.columns; state.people=prev.people; state.categories=prev.categories||state.categories; state.trayGroups=prev.trayGroups||state.trayGroups||[];
  rebuildAll(); renderFilterPanel();
  const btn=document.getElementById('undo-btn');
  btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'),400);
}

function hashState(payload){
  // Exclude savedAt from hash — it changes every call and would break dedup
  const {savedAt, ...rest}=payload;
  const s=JSON.stringify(rest);
  let h=0;
  for(let i=0;i<s.length;i++){ h=(Math.imul(31,h)+s.charCodeAt(i))|0; }
  return h.toString();
}

// strToHex/hexToStr kept for legacy decode compatibility only.
function strToHex(str){
  let hex=''; for(let i=0;i<str.length;i++) hex+=str.charCodeAt(i).toString(16).padStart(4,'0'); return hex;
}
function hexToStr(hex){
  let str=''; for(let i=0;i<hex.length;i+=4) str+=String.fromCharCode(parseInt(hex.substr(i,4),16)); return str;
}

async function saveToSheets(payload){
  const url=getSheetsUrl(); if(!url) return false;
  try{
    setSaveStatus('Saving…', 'rgba(255,255,255,0.5)');
    // Send raw JSON — no LZString. PropertiesService holds 500KB total;
    // a large ward is ~60KB, well within limits. Avoids all LZString
    // browser-compatibility issues entirely.
    const data=JSON.stringify(payload);
    console.log(`saveToSheets: ${data.length} chars raw JSON`);

    let r;
    try{
      const resp=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({action:'save', enc:'json', data})
      });
      const text=await resp.text();
      try{ r=JSON.parse(text); }
      catch(parseErr){
        console.error('Save: response not JSON. Raw:', text.slice(0,300));
        throw new Error('Apps Script returned non-JSON. Redeploy as NEW VERSION. Response: '+text.slice(0,80));
      }
    }catch(netErr){
      throw new Error('Network error during save: '+netErr.message);
    }
    console.log('Save response:', JSON.stringify(r));
    if(!r.ok) throw new Error(r.error || 'Apps Script rejected the save');
    if(r.verified) console.log(`Cloud save OK & VERIFIED — ${r.length} chars, ${r.chunks} chunk(s)`);
    else console.warn('No write-verify in response — Apps Script may need redeployment');

    const now=new Date();
    setSaveStatus(`☁ Saved ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`);
    return true;
  } catch(err){
    console.warn('Sheets save failed:',err);
    setSaveStatus('⚠ '+err.message, '#e07060');
    return false;
  }
}

// Force a cloud save regardless of hash (for manual sync / testing)
async function forceSaveToSheets(){
  const url=getSheetsUrl();
  if(!url){ alert('No Sheets URL configured — use ••• → Sync to Google Sheets to set it.'); return; }
  lastSavedHash=''; // clear hash so saveState doesn't short-circuit
  setSaveStatus('Pushing to cloud…','rgba(255,255,255,0.5)');
  const ok=await saveToSheets(statePayload());
  if(!ok) setSaveStatus('⚠ Cloud save failed — check browser console','#e07060');
}

function saveState(){
  const payload=statePayload();
  const h=hashState(payload);
  if(h===lastSavedHash) return; // nothing changed
  lastSavedHash=h;
  saveLocal(payload);
  if(syncEnabled) saveToSheets(payload);
  else {
    const now=new Date();
    setSaveStatus(`Saved ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`);
  }
}

function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveState,1200); }

// ── GOOGLE SHEETS LOAD ────────────────────────────────────────────────────────
async function loadFromSheets(){
  const url=getSheetsUrl(); if(!url) return null;
  try{
    const resp=await fetch(url+'?action=load');
    const result=await resp.json();
    console.log('Cloud load result:', JSON.stringify({ok:result.ok, hasData:!!result.data, dataType:typeof result.data, hasCompressed:!!result.compressed, compressedLen:result.compressed?String(result.compressed).length:0, error:result.error}));

    // Helper: turn whatever we got into a usable state object
    function coerce(val){
      if(!val) return null;
      // Already a parsed object with state
      if(typeof val==='object' && val.columns && val.people) return val;
      if(typeof val!=='string') return null;
      const raw=val.trim();
      if(!raw) return null;

      function tryParse(str){
        if(!str) return null;
        try{ const o=JSON.parse(str); if(o&&o.columns&&o.people) return o; }catch(e){}
        return null;
      }

      // Direct JSON?
      const direct=tryParse(raw);
      if(direct) return direct;

      // PRIMARY FORMAT (new saves): LZString.compressToBase64
      // Base64 chars: A-Za-z0-9+/= — no surrogates, no corruption possible.
      if(typeof LZString!=='undefined'){
        // Try base64 first (new format)
        try{
          const d=LZString.decompressFromBase64(raw);
          const o=tryParse(d);
          if(o){ console.log('coerce: decoded via decompressFromBase64 ✓'); return o; }
        }catch(e){}

        // LEGACY: hex-encoded LZString.compress (had surrogate issues in browser)
        const isHex=/^[0-9a-fA-F]+$/.test(raw);
        if(isHex && raw.length%4===0){
          let ck=0; for(let i=0;i<raw.length;i++) ck=(ck*31+raw.charCodeAt(i))>>>0;
          console.log(`coerce: trying hex, len=${raw.length}, checksum=${ck}`);
          try{
            const d=LZString.decompress(hexToStr(raw));
            const o=tryParse(d);
            if(o){ console.log('coerce: decoded via hex+decompress ✓'); return o; }
          }catch(e){ console.warn('hex decode threw:',e.message); }
        }

        // LEGACY: EncodedURIComponent format (had + → space corruption)
        const candidates=[raw];
        if(raw.indexOf(' ')>=0) candidates.push(raw.replace(/ /g,'+'));
        for(const s of candidates){
          try{
            const d=LZString.decompressFromEncodedURIComponent(s);
            const o=tryParse(d);
            if(o){ console.log('coerce: decoded via decompressFromEncodedURIComponent ✓'); return o; }
          }catch(e){}
        }
      }
      console.warn('coerce: could not decode string of length', raw.length, '— starts with:', raw.slice(0,40));
      return null;
    }

    if(result.ok){
      let out=coerce(result.data) || coerce(result.compressed) || coerce(result.value) || coerce(result.a1);
      if(out) return out;
    }
    console.warn('Cloud load: no usable data in response', result);
    return null;
  } catch(err){
    console.warn('Sheets load failed:', err);
    return null;
  }
}

// ── LOCAL LOAD ────────────────────────────────────────────────────────────────
function loadSavedState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
    const data=JSON.parse(raw); if(!data.columns||!data.people) return false;
    if(!data.columns.length||!data.people.length) return false;
    applyLoadedState(data);
    return true;
  } catch(e){ console.warn('Local load failed:',e); return false; }
}

function applyLoadedState(data){
  state.columns=data.columns;
  state.people=data.people;
  if(data.categories&&data.categories.length) state.categories=data.categories;
  if(data.trayGroups) state.trayGroups=data.trayGroups;
  if(data.potentialCallings) state.potentialCallings=data.potentialCallings;
  state._savedAt=data.savedAt||0;  // track timestamp for cloud freshness comparison
  uid=data.uid||uid;
  lastSavedHash=hashState(statePayload());
  migrateAllOrgs();
}
