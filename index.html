  const panel=document.createElement('div');
  panel.id='sync-panel';
  panel.style.cssText='position:fixed;top:84px;right:16px;background:#fff;border:1px solid var(--border-mid);border-radius:6px;padding:16px;z-index:1500;box-shadow:0 8px 24px rgba(0,0,0,0.15);width:340px;font-size:12px;color:var(--text-primary);';
  const currentUrl=getSheetsUrl();
  const configured=!!currentUrl;
  panel.innerHTML=`
    <div style="font-weight:600;margin-bottom:10px;color:var(--accent-navy)">☁ Google Sheets Sync</div>
    <div style="margin-bottom:10px;color:var(--text-secondary);line-height:1.6">
      ${configured
        ? `<span style="color:#1a6b30">● Connected</span> — changes save automatically to your Google Sheet.`
        : `<span style="color:#b02010">● Not configured</span> — saving locally only.`
      }
    </div>
    <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px">${configured?'Web App URL (click to change):':'Paste your Apps Script Web App URL:'}</div>
    <input id="sync-url-input" type="text" placeholder="https://script.google.com/macros/s/..." value="${currentUrl}"
      style="width:100%;font-size:11px;padding:5px 8px;border:1px solid var(--border-mid);border-radius:4px;outline:none;margin-bottom:8px;box-sizing:border-box;color:var(--text-primary);"/>
    <button onclick="applySyncUrl()" style="width:100%;padding:6px;background:var(--accent-navy);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-bottom:6px;">${configured?'Update URL':'Connect to Google Sheets'}</button>
    ${configured?`<button onclick="forceSaveToSheets()" style="width:100%;padding:6px;background:var(--accent-navy);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-bottom:6px;">☁ Push current data to cloud now</button>`:''}
    ${configured?`<button onclick="loadLatestFromSheets()" style="width:100%;padding:5px;background:transparent;color:var(--text-secondary);border:1px solid var(--border-mid);border-radius:4px;cursor:pointer;font-size:11px;margin-bottom:6px;">↓ Pull latest from cloud</button>`:''}
    <button onclick="document.getElementById('sync-panel').remove()" style="width:100%;padding:5px;background:transparent;color:var(--text-tertiary);border:1px solid var(--border-mid);border-radius:4px;cursor:pointer;font-size:11px;">Cancel</button>
  `;
  document.body.appendChild(panel);
  setTimeout(()=>panel.querySelector('#sync-url-input').select(),50);
  document.addEventListener('click', function outsideClick(e){
    const overflowDd=document.getElementById('overflow-dropdown');
    if(!panel.contains(e.target)&&e.target.id!=='overflow-menu-btn'&&!(overflowDd&&overflowDd.contains(e.target))){ panel.remove(); document.removeEventListener('click',outsideClick); }
  });
}

function applySyncUrl(){
  const val=(document.getElementById('sync-url-input')||{}).value||'';
  if(!val.trim()){ alert('Please paste a valid URL.'); return; }
  localStorage.setItem('ward-sheets-url', val.trim());
  window._SHEETS_URL_OVERRIDE=val.trim();
  syncEnabled=true;
  document.getElementById('sync-panel')&&document.getElementById('sync-panel').remove();
  // Try loading from cloud immediately
  setSaveStatus('Connecting to cloud…','rgba(0,51,102,0.6)');
  loadFromSheets().then(data=>{
    if(data){
      applyLoadedState(data);
      saveLocal(data);
      backfillStartDates();
      buildLayout(); renderTray(); renderFilterPanel(); renderQuickCats(); setTimeout(updateTrayColumns,100);
      setSaveStatus('☁ Connected & loaded from cloud');
    } else {
      // No cloud data yet — save current state up to the sheet now
      saveState();
      setSaveStatus('☁ Connected — saving to cloud now');
    }
  }).catch(()=>{
    setSaveStatus('⚠ Could not connect — check the URL','#e07060');
  });
}

async function loadLatestFromSheets(){
  setSaveStatus('Checking cloud…','rgba(255,255,255,0.5)');
  let data;
  try { data=await loadFromSheets(); } catch(e){ setSaveStatus('⚠ Could not reach cloud','#e07060'); return; }
  if(!data){ setSaveStatus('⚠ No data in cloud yet','#e07060'); return; }
  if(!data.columns||!data.people){ setSaveStatus('⚠ Cloud data unreadable','#e07060'); return; }
  const cloudTime=data.savedAt||0;
  const localTime=state._savedAt||0;
  if(cloudTime>0&&cloudTime<=localTime){
    setSaveStatus('Already up to date ✓');
    document.getElementById('sync-panel')&&document.getElementById('sync-panel').remove();
    return;
  }
  applyLoadedState(data);
  saveLocal(data);
  backfillStartDates();
  buildLayout(); renderTray(); renderFdOrgList(); renderPotentialCallings(); setTimeout(updateTrayColumns,100);
  setSaveStatus('☁ Loaded from cloud');
  document.getElementById('sync-panel')&&document.getElementById('sync-panel').remove();
}
function clearSaved(){
  // Step 1 — warning modal
  const ov1=document.createElement('div');
  ov1.className='modal-overlay';
  ov1.innerHTML=`
    <div class="modal" style="max-width:360px;border-top:3px solid #c0392b;">
      <h3 style="color:#c0392b">⚠ Reset All Data?</h3>
      <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;line-height:1.6">
        This will permanently erase <strong>all your configuration</strong> — callings, sub-groups, tray groups, person notes, calling history, and any reorganization you've done. The chart will reload with the original hardcoded ward data.
      </p>
      <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;line-height:1.6">
        This cannot be undone.
      </p>
      <div class="modal-btns">
        <button onclick="this.closest('.modal-overlay').remove()">Cancel — keep my data</button>
        <button style="background:#c0392b;color:white;border-color:#c0392b" onclick="confirmReset(this)">I understand, continue →</button>
      </div>
    </div>`;
  document.body.appendChild(ov1);
}

function confirmReset(btn){
  btn.closest('.modal-overlay').remove();
  // Step 2 — type RESET to confirm
  const ov2=document.createElement('div');
  ov2.className='modal-overlay';
  ov2.innerHTML=`
    <div class="modal" style="max-width:360px;border-top:3px solid #c0392b;">
      <h3 style="color:#c0392b">Type RESET to confirm</h3>
      <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;margin-bottom:12px;line-height:1.6">
        To confirm you want to permanently erase all ward data, type <strong>RESET</strong> in the box below.
      </p>
      <input id="reset-confirm-input" type="text" placeholder="Type RESET here…"
        style="width:100%;font-size:13px;padding:7px 10px;border:1px solid #c0392b;border-radius:4px;background:#fafafa;color:#1a1a1a;outline:none;letter-spacing:0.05em"/>
      <p id="reset-error" style="font-size:11px;color:#c0392b;margin-top:6px;min-height:16px"></p>
      <div class="modal-btns">
        <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button style="background:#c0392b;color:white;border-color:#c0392b" onclick="executeReset()">Reset Everything</button>
      </div>
    </div>`;
  document.body.appendChild(ov2);
  setTimeout(()=>document.getElementById('reset-confirm-input').focus(),50);
  document.getElementById('reset-confirm-input').addEventListener('keydown',e=>{ if(e.key==='Enter') executeReset(); });
}

function executeReset(){
  const val=(document.getElementById('reset-confirm-input').value||'').trim();
  if(val!=='RESET'){
    document.getElementById('reset-error').textContent='Please type RESET exactly (all caps).';
    document.getElementById('reset-confirm-input').style.borderColor='#c0392b';
    return;
  }
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Name','Calling','Group','Years in Calling','Status']];
  state.people.forEach(p=>{
    const col=state.columns.find(c=>c.id===p.colId);
    const status=p.colId===TRAY?'No Calling':p.vacant?'Vacant':'Serving';
    rows.push([`"${p.name}"`,`"${p.role}"`,`"${col?col.name:'No Calling'}"`,p.vacant||p.colId===TRAY?'':p.time.toFixed(1),status]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='ward_callings.csv'; a.click();
}

function exportJSON(){
  const payload=statePayload();
  const json=JSON.stringify(payload, null, 2);
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([json],{type:'application/json'})); a.download='ward_org_chart_backup.json'; a.click();
}

async function saveCloudBackup(){
  const url=getSheetsUrl();
  if(!url){ alert('Cloud sync not configured. Set up Google Sheets sync first via ••• → Sync to Google Sheets.'); return; }
  setSaveStatus('Saving cloud backup…','rgba(255,255,255,0.5)');
  try{
    const data=JSON.stringify(statePayload());
    const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'backup',data})});
    const r=await resp.json();
    if(r.ok){
      setSaveStatus(`☁ Backup saved (${r.stamp})`);
      alert(`Cloud backup saved!\n\nTimestamp: ${r.stamp}\n\nYou can restore this snapshot anytime via ••• → Restore from cloud backup.`);
    } else {
      setSaveStatus('⚠ Cloud backup failed','#e07060');
      alert('Cloud backup failed: '+(r.error||'Unknown error'));
    }
  }catch(e){ setSaveStatus('⚠ Cloud backup failed','#e07060'); alert('Network error: '+e.message); }
}

async function restoreCloudBackup(){
  const url=getSheetsUrl();
  if(!url){ alert('Cloud sync not configured.'); return; }
  setSaveStatus('Loading cloud backup…','rgba(255,255,255,0.5)');
  try{
    const resp=await fetch(url+'?action=loadbackup');
    const r=await resp.json();
    if(!r.ok||!r.data){ setSaveStatus('',''); alert(r.empty?'No cloud backup found yet.\n\nSave one first via ••• → Save cloud backup snapshot.':'Could not load backup: '+(r.error||'Unknown error')); return; }
    let data;
    try{ data=JSON.parse(r.data); }catch(e){ alert('Backup data is corrupted.'); return; }
    if(!data.columns||!data.people){ alert('Backup missing columns or people.'); return; }
    window._pendingImport=data;
    const ov=document.createElement('div'); ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal" style="max-width:360px;border-top:3px solid var(--accent);">
      <h3>Restore cloud backup?</h3>
      <p style="font-size:13px;color:var(--ink-2);margin:8px 0;">Saved: <strong>${r.stamp||'unknown time'}</strong></p>
      <p style="font-size:13px;color:var(--ink-2);margin:8px 0;">${data.people.length} people · ${data.columns.length} orgs</p>
      <p style="font-size:12px;color:#b03030;margin:12px 0 0;">This will replace your current data. Your local copy will be overwritten.</p>
      <div class="modal-btns"><button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="primary" onclick="confirmRestoreCloudBackup()">Restore</button></div></div>`;
    document.body.appendChild(ov);
  }catch(e){ setSaveStatus('',''); alert('Network error: '+e.message); }
}

function confirmRestoreCloudBackup(){
  const data=window._pendingImport; if(!data) return;
  snapshot();
  applyLoadedState(data); saveLocal(statePayload()); backfillStartDates(); migrateAllOrgs();
  buildLayout(); renderTray(); renderJumpNav(); renderFdOrgList(); renderPotentialCallings();
  setSaveStatus('☁ Restored from cloud backup');
  document.querySelector('.modal-overlay')&&document.querySelector('.modal-overlay').remove();
  window._pendingImport=null;
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.columns||!data.people){ alert('Invalid backup file — missing columns or people.'); return; }
      // Store data on window so the modal button can reference it without inlining JSON
      window._pendingImport=data;
      const ov=document.createElement('div'); ov.className='modal-overlay';
      ov.innerHTML=`<div class="modal" style="max-width:360px;border-top:3px solid var(--navy);">
        <h3>Restore from backup?</h3>
        <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;line-height:1.6">
          This will replace your current ward data with the backup file.<br><br>
          <strong>${data.people.filter(p=>p.colId!=='__tray__').length} callings</strong> across <strong>${data.columns.length} orgs</strong>.
        </p>
        <div class="modal-btns">
          <button onclick="this.closest('.modal-overlay').remove();window._pendingImport=null;">Cancel</button>
          <button class="primary" id="confirm-restore-btn">Restore</button>
        </div>
      </div>`;
      document.body.appendChild(ov);
      document.getElementById('confirm-restore-btn').onclick=()=>applyJSONImport(window._pendingImport);
    } catch(err){ alert('Could not read file: '+err.message); }
    input.value='';
  };
  reader.readAsText(file);
}

function applyJSONImport(data){
  document.querySelectorAll('.modal-overlay').forEach(el=>el.remove());
  snapshot();
  applyLoadedState(data);
  saveLocal(data);
  backfillStartDates();
  migrateAllOrgs();
  buildLayout(); renderTray(); renderFdOrgList();
  setSaveStatus('Restored from backup ✓');
  if(syncEnabled) saveToSheets(statePayload());
}

function importCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
      if(lines.length<2){ alert('CSV appears empty.'); return; }
      const headers=parseCSVRow(lines[0]).map(h=>h.toLowerCase().trim());
      const iName=headers.indexOf('name'), iCalling=headers.findIndex(h=>h.includes('calling')), iGroup=headers.indexOf('group'), iYears=headers.findIndex(h=>h.includes('year')), iStatus=headers.indexOf('status');
      if(iName<0||iGroup<0){ alert('CSV must have Name and Group columns.'); return; }

      // MERGE into existing state — don't wipe it
      snapshot();
      const touched=new Set();
      lines.slice(1).forEach(line=>{
        const cells=parseCSVRow(line);
        const name=(cells[iName]||'').trim();
        const role=(iCalling>=0?cells[iCalling]||'':'').trim();
        const group=(cells[iGroup]||'').trim();
        const years=iYears>=0?parseFloat(cells[iYears]||0)||0:0;
        const status=(iStatus>=0?cells[iStatus]||'':'').trim().toLowerCase();
        const vacant=status==='vacant'||name.toLowerCase()==='vacant';
        const inTray=status==='no calling'||group.toLowerCase()==='no calling';
        if(!name) return;

        // Find or create the column
        let col=state.columns.find(c=>c.name===group);
        if(!col&&!inTray&&group){
          col={id:mkid(),name:group,color:COLORS[state.columns.length%COLORS.length],order:state.columns.length,subgroups:[],hidden:false,category:''};
          state.columns.push(col);
        }
        const colId=inTray?TRAY:(col?col.id:TRAY);

        // Find existing person by name+role+org or just name+org
        let existing=state.people.find(p=>p.name===name&&p.colId===colId&&(p.role===role||!role));
        if(!existing) existing=state.people.find(p=>p.name===name&&p.colId===colId);
        if(existing){
          // Update only what the CSV contains, preserve everything else
          if(role) existing.role=role;
          if(years>0) existing.time=years;
          existing.vacant=vacant;
          touched.add(existing.id);
        } else {
          // New person — add them
          const p={id:mkid(),name,role,colId,subgroupId:null,time:years,vacant,age:0,gender:''};
          state.people.push(p);
          touched.add(p.id);
        }
      });

      rebuildAll(); renderFilterPanel(); saveState();
      setSaveStatus(`CSV merged — ${touched.size} records updated ✓`);
    } catch(err){ alert('Error: '+err.message); }
    input.value='';
  };
  reader.readAsText(file);
}
function parseCSVRow(line){
  const cells=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){ if(line[i]==='"'){ inQ=!inQ; } else if(line[i]===','&&!inQ){ cells.push(cur); cur=''; } else { cur+=line[i]; } }
  cells.push(cur); return cells;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
// Check for a stored Sheets URL (set via the Sync panel)
(function(){
  const stored=localStorage.getItem('ward-sheets-url');
  if(stored && !SHEETS_URL) {
    // Can't reassign const, so we patch syncEnabled and use stored URL at runtime
    window._SHEETS_URL_OVERRIDE=stored;
    syncEnabled=true;
  }
})();

function getSheetsUrl(){ return SHEETS_URL || window._SHEETS_URL_OVERRIDE || localStorage.getItem('ward-sheets-url') || ''; }

const hasSaved=loadSavedState();

// Safety: if all columns are hidden (e.g. from old saved state), show them all
if(state.columns.every(c=>c.hidden)){
  state.columns.forEach(c=>c.hidden=false);
}

// Safety: ensure every column has required fields
state.columns.forEach((c,i)=>{
  if(c.order===undefined) c.order=i;
  if(!c.subgroups) c.subgroups=[];
  if(c.category===undefined) c.category='';
  if(c.collapsed===undefined) c.collapsed=false;
  if(c.colIndex===undefined) c.colIndex=i%4;
});

// Safety: ensure people have subgroupId field
state.people.forEach(p=>{
  if(p.subgroupId===undefined) p.subgroupId=null;
});

backfillStartDates();
migrateAllOrgs();
console.log('Init: columns='+state.columns.length+', people='+state.people.length+', hasSaved='+hasSaved);

// Init quick filter pills
setQuickFilter('all');

buildLayout();
renderTray();
renderFdOrgList();
renderPotentialCallings();
setTimeout(updateTrayColumns, 100);
applyZoom();
if(hasSaved) setSaveStatus('Restored ✓');

if(syncEnabled){
  setSaveStatus('Checking cloud…');
  loadFromSheets().then(data=>{
    if(!data){ setSaveStatus(hasSaved?'Restored ✓':''); return; }
    const cloudTime = data.savedAt || 0;
    const localTime = state._savedAt || 0;
    if(cloudTime > localTime){
      // Cloud is newer — apply it
      applyLoadedState(data);
      saveLocal(data);
      backfillStartDates();
      buildLayout(); renderTray(); renderFdOrgList(); renderPotentialCallings(); setTimeout(updateTrayColumns,100);
      setSaveStatus('☁ Loaded from cloud');
    } else {
      // Local is same or newer — keep local, push to cloud to sync it up
      setSaveStatus(hasSaved?'Restored ✓':'');
      if(hasSaved && cloudTime < localTime) saveToSheets(statePayload());
    }
  });
}
</script>
